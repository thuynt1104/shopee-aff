<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Link Shopee Affiliate</title>

<style>

body{
font-family: Arial;
background:#f6f6f6;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.title{
color:#ff5722;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.input-box{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

button{
border:none;
padding:12px 16px;
border-radius:8px;
cursor:pointer;
}

.paste{
background:#ff5722;
color:white;
}

.copy{
background:#4caf50;
color:white;
margin-top:10px;
width:100%;
}

.result{
margin-top:15px;
word-break:break-all;
color:#333;
}

.link-btn{
background:#e8f0fe;
color:#1967d2;
padding:15px;
text-align:center;
border-radius:10px;
font-weight:bold;
}

.telegram{
background:#f2f2f2;
padding:15px;
border-radius:10px;
}

.guide li{
margin-bottom:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">Tạo link</div>

<div>Dán link Shopee để tạo link Affiliate</div>

<div class="input-box">

<input id="linkInput" placeholder="Dán link Shopee">

<button class="paste" onclick="pasteLink()">Dán link</button>

</div>

<button class="paste" style="margin-top:10px;width:100%;" onclick="createLink()">
Tạo Link
</button>

<div class="result" id="result"></div>

<button class="copy" onclick="copyLink()">Copy Link</button>

</div>

<div class="card link-btn">
<a href="https://www.facebook.com/people/Em-xinh/61570122636972/">Đến bài đăng Facebook
</a>
</div>

<div class="card telegram">
Vào nhóm Telegram để săn thêm nhiều mã giảm giá
</div>

<div class="card">

<h3>Hướng dẫn</h3>

<ol class="guide">
<li>Dán link Shopee rồi nhấn tạo link</li>
<li>Sao chép link Affiliate</li>
<li>Chia sẻ link để nhận hoa hồng</li>
<li>Mỗi sản phẩm nên tạo link mới</li>
</ol>

</div>

</div>

<script>

let affLink="";

function pasteLink(){
navigator.clipboard.readText().then(text=>{
document.getElementById("linkInput").value=text;
});
}

function createLink(){

let link=document.getElementById("linkInput").value;

if(!link){
alert("Hãy dán link Shopee");
return;
}

affLink="https://shope.ee/17372520347?url="+encodeURIComponent(link);

document.getElementById("result").innerHTML=affLink;

}

function copyLink(){

if(!affLink){
alert("Chưa có link để copy");
return;
}

navigator.clipboard.writeText(affLink);

alert("Đã copy link");

}

</script>

</body>
</html>
